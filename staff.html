<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCKBOARD · Staff</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--accent:#8B0000;--green:#39FF14;--amber:#FFB347;--white:#f0ede8;--card:rgba(20,10,10,0.9);--font-pixel:'VT323',monospace;--font-head:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
  html,body{min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse at top,rgba(139,0,0,0.12) 0%,transparent 60%);color:var(--white);font-family:var(--font-body)}

  #pin-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px 20px}
  #pin-screen h1{font-family:var(--font-head);font-size:42px;letter-spacing:6px}
  #pin-screen p{font-family:var(--font-pixel);font-size:16px;letter-spacing:3px;color:rgba(240,237,232,0.4)}
  #pin-dots{display:flex;gap:16px}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(139,0,0,0.5);background:transparent;transition:background 0.15s}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
  #pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
  .pin-key{height:64px;background:var(--card);border:1px solid rgba(139,0,0,0.3);border-radius:8px;color:var(--white);font-family:var(--font-head);font-size:28px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
  .pin-key:active{background:rgba(139,0,0,0.4);transform:scale(0.96)}
  .pin-key.clear{font-size:18px;color:rgba(240,237,232,0.4)}
  #pin-error{font-family:var(--font-pixel);font-size:16px;color:#ff4444;letter-spacing:3px;min-height:24px;text-align:center}
  #stay-logged-in{display:flex;align-items:center;gap:10px;font-family:var(--font-pixel);font-size:15px;letter-spacing:2px;color:rgba(240,237,232,0.4);cursor:pointer}
  #stay-logged-in input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}

  #staff-app{display:none}
  #staff-app.show{display:block}
  #staff-header{background:rgba(10,10,10,0.97);border-bottom:2px solid rgba(139,0,0,0.4);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
  #staff-header h1{font-family:var(--font-head);font-size:32px;letter-spacing:5px}
  #staff-header .sub{font-family:var(--font-pixel);font-size:14px;color:var(--accent);letter-spacing:3px;margin-top:2px}
  #header-right{display:flex;gap:10px;align-items:center}

  #controls-bar{padding:16px 24px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(139,0,0,0.2);background:rgba(5,0,0,0.5);align-items:center}
  .ctrl-btn{padding:12px 22px;border-radius:6px;border:1px solid;font-family:var(--font-pixel);font-size:18px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
  .ctrl-btn:active{transform:scale(0.97)}
  .ctrl-btn.tshirt-on{background:rgba(255,179,71,0.15);border-color:rgba(255,179,71,0.5);color:var(--amber)}
  .ctrl-btn.tshirt-off{background:rgba(20,10,10,0.5);border-color:rgba(255,255,255,0.1);color:rgba(240,237,232,0.3)}
  .ctrl-btn.winner-btn{background:rgba(57,255,20,0.1);border-color:rgba(57,255,20,0.4);color:var(--green)}
  .ctrl-btn.queue-ctrl-btn{background:rgba(30,215,96,0.1);border-color:rgba(30,215,96,0.4);color:#1ED760}
  .ctrl-btn.auto-queue-btn{background:rgba(30,215,96,0.05);border-color:rgba(30,215,96,0.2);color:rgba(30,215,96,0.4)}
  .ctrl-btn.auto-queue-btn.on{background:rgba(30,215,96,0.18);border-color:rgba(30,215,96,0.6);color:#1ED760}
  .ctrl-btn.clear-btn{background:rgba(255,68,68,0.1);border-color:rgba(255,68,68,0.3);color:#ff6666}
  .ctrl-btn.lock-btn{background:rgba(20,10,10,0.5);border-color:rgba(255,255,255,0.1);color:rgba(240,237,232,0.3)}
  .ctrl-btn.approve-btn{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.25);color:rgba(57,255,20,0.5)}
  .ctrl-btn.approve-btn.on{background:rgba(57,255,20,0.18);border-color:rgba(57,255,20,0.6);color:var(--green)}
  .ctrl-btn.queue-ctrl-btn{background:rgba(30,215,96,0.1);border-color:rgba(30,215,96,0.4);color:#1ED760}
  .ctrl-btn.auto-queue-btn{background:rgba(30,215,96,0.05);border-color:rgba(30,215,96,0.2);color:rgba(30,215,96,0.4)}
  .ctrl-btn.auto-queue-btn.on{background:rgba(30,215,96,0.18);border-color:rgba(30,215,96,0.6);color:#1ED760}
  .queue-btn{padding:12px 18px;background:rgba(30,215,96,0.2);border:1px solid rgba(30,215,96,0.5);border-radius:6px;color:#1ED760;font-family:var(--font-pixel);font-size:17px;letter-spacing:1px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;white-space:nowrap}
  .queue-btn:active{background:rgba(30,215,96,0.4)}
  .played-btn{padding:12px 18px;background:rgba(255,179,71,0.15);border:1px solid rgba(255,179,71,0.4);border-radius:6px;color:var(--amber);font-family:var(--font-pixel);font-size:17px;letter-spacing:1px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;white-space:nowrap}
  .played-btn:active{background:rgba(255,179,71,0.3)}
  .approved-card.top-track{border-color:rgba(30,215,96,0.3);background:rgba(10,30,15,0.9)}
  .approved-card.top-track .ac-rank{color:#1ED760}
  .approved-card.queued-track{border-color:rgba(30,215,96,0.5)}
  .ctrl-btn.approve-btn.on{background:rgba(57,255,20,0.18);border-color:rgba(57,255,20,0.6);color:var(--green)}
  .approve-all-btn{padding:10px 20px;border-radius:6px;border:1px solid rgba(57,255,20,0.4);background:rgba(57,255,20,0.1);color:var(--green);font-family:var(--font-pixel);font-size:17px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none}
  .approve-all-btn:active{background:rgba(57,255,20,0.25)}

  #tabs{display:flex;border-bottom:2px solid rgba(139,0,0,0.25);background:rgba(5,0,0,0.3)}
  .tab{flex:1;padding:16px;font-family:var(--font-pixel);font-size:18px;letter-spacing:3px;text-align:center;color:rgba(240,237,232,0.3);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
  .tab.active{color:var(--white);border-bottom-color:var(--accent);background:rgba(139,0,0,0.08)}
  .tab .badge{display:inline-block;background:var(--accent);color:var(--white);border-radius:10px;font-size:13px;padding:2px 8px;margin-left:6px;vertical-align:middle}

  .list-section{padding:16px 24px;display:none}
  .list-section.show{display:block}
  .list-label{font-family:var(--font-pixel);font-size:16px;letter-spacing:3px;color:rgba(240,237,232,0.4);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .list-label span{color:var(--amber)}

  .request-card{
    background:var(--card);border:1px solid rgba(139,0,0,0.25);
    border-left:4px solid rgba(139,0,0,0.5);
    border-radius:0 8px 8px 0;padding:16px 20px;margin-bottom:8px;
    display:flex;align-items:center;gap:20px;
    transition:opacity 0.25s,transform 0.25s;
  }
  .request-card.ditching{opacity:0;transform:translateX(60px)}
  .request-card.keeping{opacity:0;transform:translateX(-60px)}
  .request-card.genre-mismatch{border-left-color:var(--amber);background:rgba(30,20,0,0.6)}

  /* LEFT — track info */
  .rc-info{flex:1;min-width:0}
  .rc-track{font-family:var(--font-head);font-size:28px;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
  .rc-artist{font-size:15px;color:rgba(240,237,232,0.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
  .rc-badge{font-family:var(--font-pixel);font-size:14px;color:var(--amber);letter-spacing:1px;margin-top:3px}

  /* MIDDLE — votes */
  .rc-votes{font-family:var(--font-pixel);font-size:38px;color:var(--white);min-width:52px;text-align:center;line-height:1;flex-shrink:0}
  .rc-votes-label{font-family:var(--font-pixel);font-size:12px;color:rgba(240,237,232,0.25);letter-spacing:2px;text-align:center;margin-top:2px}

  /* RIGHT — actions */
  .rc-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
  .rc-spotify-btn{background:rgba(30,215,96,0.1);border:1px solid rgba(30,215,96,0.3);color:rgba(30,215,96,0.8);border-radius:6px;padding:12px 14px;font-family:var(--font-pixel);font-size:18px;letter-spacing:1px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap;-webkit-appearance:none}
  .keep-btn,.ditch-btn,.ban-btn{padding:14px 22px;border-radius:6px;font-family:var(--font-head);font-size:22px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none;white-space:nowrap}
  .keep-btn:active,.ditch-btn:active,.ban-btn:active{transform:scale(0.95)}
  .keep-btn{background:rgba(57,255,20,0.15);border:1px solid rgba(57,255,20,0.4);color:var(--green)}
  .ditch-btn{background:rgba(139,0,0,0.2);border:1px solid rgba(139,0,0,0.45);color:#ff6666}
  .ban-btn{background:rgba(80,0,0,0.3);border:1px solid rgba(139,0,0,0.6);color:rgba(255,100,100,0.7);font-size:18px;padding:12px 16px}

  .approved-card{background:var(--card);border:1px solid rgba(57,255,20,0.15);border-left:4px solid rgba(57,255,20,0.3);border-radius:0 8px 8px 0;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:16px}
  .approved-card.top-track{border-left-color:var(--amber);border-color:rgba(255,179,71,0.3);background:rgba(30,18,0,0.8)}
  .ac-rank{font-family:var(--font-head);font-size:36px;color:rgba(240,237,232,0.12);min-width:52px;text-align:center;line-height:1;flex-shrink:0}
  .approved-card.top-track .ac-rank{color:var(--amber)}
  .ac-details{flex:1;min-width:0}
  .ac-title{font-family:var(--font-head);font-size:26px;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1}
  .approved-card.top-track .ac-title{color:var(--amber)}
  .ac-artist{font-size:14px;color:rgba(240,237,232,0.5);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac-requester{font-family:var(--font-pixel);font-size:15px;color:rgba(200,60,60,0.9);letter-spacing:1px;margin-top:3px}
  .approved-card.top-track .ac-requester{color:rgba(255,179,71,0.7)}
  .ac-meta{font-family:var(--font-pixel);font-size:26px;color:var(--white);text-align:right;min-width:60px;flex-shrink:0}
  .approved-card.top-track .ac-meta{color:var(--amber)}
  .ac-meta small{font-size:10px;color:rgba(240,237,232,0.3);display:block;letter-spacing:2px}
  .ac-ditch{background:transparent;border:1px solid rgba(139,0,0,0.3);border-radius:5px;padding:6px 10px;color:rgba(255,68,68,0.5);font-family:var(--font-pixel);font-size:13px;cursor:pointer;transition:all 0.15s;-webkit-appearance:none}
  .ac-ditch:active{background:rgba(139,0,0,0.3);color:#ff4444}
  .spotify-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:rgba(30,215,96,0.15);border:1px solid rgba(30,215,96,0.4);border-radius:5px;color:#1ED760;font-size:18px;text-decoration:none;flex-shrink:0;transition:all 0.15s}
  .spotify-btn:active{background:rgba(30,215,96,0.3);transform:scale(0.95)}
  .approved-card.top-track{border-color:rgba(30,215,96,0.3);background:rgba(10,30,15,0.9);box-shadow:0 0 15px rgba(30,215,96,0.05)}
  .approved-card.top-track .ac-rank{color:#1ED760}
  .approved-card.queued-track{border-color:rgba(30,215,96,0.5);background:rgba(5,25,10,0.95)}
  .queue-btn{padding:8px 12px;background:rgba(30,215,96,0.2);border:1px solid rgba(30,215,96,0.5);border-radius:5px;color:#1ED760;font-family:var(--font-pixel);font-size:13px;letter-spacing:1px;cursor:pointer;flex-shrink:0;transition:all 0.15s;-webkit-appearance:none}
  .queue-btn:active{background:rgba(30,215,96,0.4);transform:scale(0.95)}
  .played-btn{padding:8px 12px;background:rgba(255,179,71,0.15);border:1px solid rgba(255,179,71,0.4);border-radius:5px;color:var(--amber);font-family:var(--font-pixel);font-size:13px;letter-spacing:1px;cursor:pointer;flex-shrink:0;transition:all 0.15s;-webkit-appearance:none}
  .played-btn:active{background:rgba(255,179,71,0.3);transform:scale(0.95)}
  .empty-state{text-align:center;padding:40px 20px;font-family:var(--font-pixel);font-size:18px;color:rgba(240,237,232,0.25);letter-spacing:3px;line-height:1.8}
  .rc-spotify{margin-bottom:10px}
  .spotify-preview-btn{display:block;text-align:center;padding:10px;background:rgba(30,215,96,0.08);border:1px solid rgba(30,215,96,0.25);border-radius:6px;color:#1ED760;font-family:var(--font-pixel);font-size:15px;letter-spacing:2px;text-decoration:none;transition:all 0.15s}
  .spotify-preview-btn:active{background:rgba(30,215,96,0.2)}

  #winner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px}
  #winner-overlay.show{display:flex}
  #winner-overlay h1{font-family:var(--font-head);font-size:56px;letter-spacing:6px;color:var(--amber)}
  .w-track{font-family:var(--font-head);font-size:38px;color:var(--white)}
  .w-artist{font-size:18px;color:rgba(240,237,232,0.6)}
  .w-quote{font-family:var(--font-pixel);font-size:24px;color:var(--green);max-width:600px;line-height:1.5}
  .w-votes{font-family:var(--font-pixel);font-size:16px;color:rgba(240,237,232,0.4);letter-spacing:3px}
  #winner-close{margin-top:16px;font-family:var(--font-pixel);font-size:16px;letter-spacing:3px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);padding:10px 24px;border-radius:4px;background:transparent;color:rgba(240,237,232,0.4);transition:all 0.2s}
  #winner-close:hover{border-color:var(--amber);color:var(--amber)}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div><h1>ROCKBOARD</h1><p style="text-align:center;margin-top:4px;">STAFF ACCESS</p></div>
  <div id="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div id="pin-keypad">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key clear" onclick="pinClear()">CLR</button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key clear" onclick="pinBack()">⌫</button>
  </div>
  <label id="stay-logged-in"><input type="checkbox" id="remember-me"> STAY LOGGED IN ON THIS DEVICE</label>
  <div id="pin-error"></div>
</div>

<!-- STAFF APP -->
<div id="staff-app">
  <div id="staff-header">
    <div><h1 id="s-venue">STAFF · ROCKBOARD</h1><div class="sub" id="s-sub">THE BLACK ROSE</div></div>
    <div id="header-right">
      <button class="ctrl-btn lock-btn" onclick="lock()">LOCK</button>
    </div>
  </div>
  <div id="controls-bar">
    <button class="ctrl-btn tshirt-on" id="tshirt-btn" onclick="toggleTshirt()">🏆 T-SHIRT: ON</button>
    <button class="ctrl-btn approve-btn" id="auto-approve-btn" onclick="toggleAutoApprove()">⚡ AUTO-APPROVE: OFF</button>
    <button class="ctrl-btn queue-ctrl-btn" id="queue-top-btn" onclick="queueTopTrack()" style="display:none">🎵 QUEUE NO.1</button>
    <button class="ctrl-btn auto-queue-btn" id="auto-queue-btn" onclick="toggleAutoQueue()" style="display:none">⏱ AUTO-QUEUE: OFF</button>
    <div id="interval-wrap" style="display:none;align-items:center;gap:6px">
      <span style="font-family:var(--font-pixel);font-size:13px;letter-spacing:2px;color:rgba(240,237,232,0.4)">EVERY</span>
      <input type="number" id="interval-input" min="1" max="60" value="2"
        style="width:52px;background:rgba(0,0,0,0.4);border:1px solid rgba(30,215,96,0.3);border-radius:4px;padding:8px 6px;color:#1ED760;font-family:var(--font-pixel);font-size:18px;letter-spacing:2px;text-align:center;outline:none;-webkit-appearance:none"
        onchange="updateInterval(this.value)">
      <span style="font-family:var(--font-pixel);font-size:13px;letter-spacing:2px;color:rgba(240,237,232,0.4)">MINS</span>
    </div>
    <div id="offset-wrap" style="display:none;align-items:center;gap:6px;margin-left:8px;padding-left:12px;border-left:1px solid rgba(255,255,255,0.1)">
      <span style="font-family:var(--font-pixel);font-size:13px;letter-spacing:2px;color:rgba(240,237,232,0.4)">VIDEO OFFSET</span>
      <input type="number" id="offset-input" min="-30" max="30" value="0"
        style="width:56px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,179,71,0.3);border-radius:4px;padding:8px 6px;color:var(--amber);font-family:var(--font-pixel);font-size:18px;letter-spacing:2px;text-align:center;outline:none;-webkit-appearance:none"
        onchange="updateVideoOffset(this.value)">
      <span style="font-family:var(--font-pixel);font-size:13px;letter-spacing:2px;color:rgba(240,237,232,0.4)">SECS</span>
    </div>
    <button class="ctrl-btn winner-btn" onclick="revealWinner()">🏆 REVEAL WINNER</button>
    <button class="ctrl-btn clear-btn" onclick="clearNight()">↺ NEW NIGHT</button>
  </div>
  <div id="tabs">
    <div class="tab active" id="tab-pending" onclick="switchTab('pending')">PENDING <span class="badge" id="pending-badge" style="display:none">0</span></div>
    <div class="tab" id="tab-approved" onclick="switchTab('approved')">APPROVED</div>
    <div class="tab" id="tab-played" onclick="switchTab('played')">PLAYED</div>
    <div class="tab" id="tab-banned" onclick="switchTab('banned')" style="color:rgba(255,80,80,0.6)">🚫 BANNED <span id="banned-count-num" style="color:rgba(255,80,80,0.8)">0</span></div>
  </div>
  <div class="list-section show" id="section-pending">
    <div class="list-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>AWAITING REVIEW · <span id="pending-count-num">0</span></span>
      <button class="ctrl-btn approve-all-btn" onclick="approveAll()" id="approve-all-btn" style="display:none">✓ APPROVE ALL</button>
    </div>
    <div id="pending-list"></div>
  </div>
  <div class="list-section" id="section-approved">
    <div class="list-label">LIVE ON THE BOARD · <span id="approved-count-num">0</span></div>
    <div id="approved-list"></div>
  </div>
</div>

  <div class="list-section" id="section-banned">
    <div class="list-label" style="color:rgba(255,80,80,0.6)">PERMANENTLY BANNED TRACKS · <span id="banned-count-num2">0</span> TOTAL</div>
    <div id="banned-list"></div>
  </div>

  <div class="list-section" id="section-played">
    <div class="list-label">PLAYED TONIGHT · NO REPEATS FOR 1HR · <span id="played-count-num">0</span></div>
    <div id="played-list"></div>
  </div>

<div id="winner-overlay">
  <div style="font-size:60px">🏆</div>
  <h1>TONIGHT'S CHAMPION</h1>
  <div class="w-track" id="w-track">—</div>
  <div class="w-artist" id="w-artist">—</div>
  <div class="w-quote" id="w-quote">—</div>
  <div class="w-votes" id="w-votes">—</div>

// ── SPOTIFY via Worker ──
async function spotifyCall(endpoint, method='GET', body=null) {
  if (!CONFIG.spotify_worker_url) return null;
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(CONFIG.spotify_worker_url + endpoint, opts);
    return await res.json();
  } catch(e) { console.warn('Spotify error', e); return { error: e.message }; }
}

window._queueTopTrack = async function() {
  const recentlyPlayed = await getRecentlyPlayed();
  const approved = [...allTracks.filter(t=>t.approved && !t.spotifyQueued)].sort((a,b)=>b.uniqueVoters-a.uniqueVoters);
  if (!approved.length) { showStaffToast('NO TRACKS TO QUEUE'); return; }
  // Skip recently played, warn staff
  const top = approved.find(t => !recentlyPlayed.includes((t.title+'|||'+t.artist).toLowerCase())) || approved[0];
  const wasSkipped = recentlyPlayed.includes((top.title+'|||'+top.artist).toLowerCase());
  if (wasSkipped) showStaffToast('⚠ ALL TOP TRACKS PLAYED RECENTLY');
  showStaffToast('🔍 SEARCHING SPOTIFY...');
  function cleanT(t) {
    return t.replace(/\s*[-–]\s*(remaster|remastered|remix|live|acoustic|edit|version|radio|single|album|mono|stereo|demo|instrumental).*/i,'').replace(/\s*\((remaster|remastered|remix|live|acoustic|edit|version|radio|single|album|mono|stereo|demo|feat\.?|ft\.?|with\s)[^)]*\)/gi,'').trim() || t.trim();
  }
  const cleanTitle  = cleanT(top.title);
  const cleanArtist = top.artist.replace(/\s*feat\.?.*/i,'').trim() || top.artist;
  let found = null;
  for (const [t,a] of [[cleanTitle,cleanArtist],[top.title,cleanArtist],[cleanTitle,top.artist],[top.title,top.artist],[cleanTitle,''],[top.title,'']]) {
    found = await spotifyCall('/search?track='+encodeURIComponent(t)+(a?'&artist='+encodeURIComponent(a):''));
    if (found?.uri) break;
  }
  if (!found?.uri) { showStaffToast('❌ NOT FOUND ON SPOTIFY: ' + top.title); return; }
  showStaffToast('⏳ QUEUING: ' + found.name + '...');
  const result = await spotifyCall('/queue', 'POST', { uri: found.uri });
  console.log('Queue result:', JSON.stringify(result));
  if (result?.ok) {
    await updateDoc(doc(db,'tracks',top.id), { spotifyQueued: true, spotifyUri: found.uri, queuedAt: Date.now() });
    showStaffToast('✅ QUEUED: ' + found.name + ' — REMOVING IN 30s');
    setTimeout(async () => {
      try {
        const { setDoc: sd2 } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        await sd2(doc(db,'played',top.id), {
          title: top.title, artist: top.artist,
          playedAt: Date.now(), spotifyUri: found.uri,
        });
        await deleteDoc(doc(db,'tracks',top.id));
        showStaffToast('✅ REMOVED: ' + found.name);
      } catch(e) { console.warn('Auto-remove failed', e); }
    }, 30000);
  } else {
    // Dig into nested Spotify error structure
    let err = 'UNKNOWN ERROR';
    if (typeof result?.error === 'string') err = result.error;
    else if (result?.error?.error?.message) err = result.error.error.message + ' (' + result.error.error.status + ')';
    else if (result?.error?.message) err = result.error.message;
    else err = JSON.stringify(result);
    showStaffToast('❌ ' + err);
  }
};

// Auto-queue interval now managed by board

function applyAutoQueueState(on) {
  autoQueueOn = on;
  const btn = document.getElementById('auto-queue-btn');
  if (!btn) return;

    showStaffToast('⏱ ' + m + ' MIN TIMER — COUNTDOWN RESET');

    updateDoc(doc(db,'settings','venue'), { autoQueueMins: m }).catch(()=>{});
    showStaffToast('⏱ INTERVAL SET TO ' + m + ' MINS');
  }
};

  updateDoc(doc(db,'settings','venue'), { videoOffset: s }).catch(()=>{});
  showStaffToast('🎬 VIDEO OFFSET: ' + (s >= 0 ? '+' : '') + s + 's');
};

// restoreAutoQueueState merged into restoreAllStates

async function getRecentlyPlayed() {
  try {
    const { getDocs: getD, collection: col } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getD(col(db,'played'));
    const cutoff = Date.now() - 60 * 60 * 1000; // 1 hour ago
    return snap.docs
      .filter(d => d.data().playedAt > cutoff)
      .map(d => (d.data().title + '|||' + d.data().artist).toLowerCase());
  } catch(e) { return []; }
}

async function runAutoQueue() {
  // Get list of tracks played in last hour
  const recentlyPlayed = await getRecentlyPlayed();

  const approved = [...allTracks.filter(t => t.approved && !t.spotifyQueued)]
    .sort((a,b) => b.uniqueVoters - a.uniqueVoters);

  if (!approved.length) {
    showStaffToast('⏱ AUTO-QUEUE: NO TRACKS READY');
    return;
  }

  // Find the top track that hasn't been played in the last hour
  const top = approved.find(t => {
    const key = (t.title + '|||' + t.artist).toLowerCase();
    return !recentlyPlayed.includes(key);
  });

  if (!top) {
    showStaffToast('⏱ ALL TOP TRACKS PLAYED RECENTLY — WAITING');
    return;
  }

  showStaffToast('⏱ AUTO-QUEUING: ' + top.title);

  // Only clean if title contains known suffixes — don't strip short titles
  function cleanTrackTitle(t) {
    return t
      .replace(/\s*[-–]\s*(remaster|remastered|remix|live|acoustic|edit|version|radio|single|album|mono|stereo|demo|instrumental).*/i, '')
      .replace(/\s*\((remaster|remastered|remix|live|acoustic|edit|version|radio|single|album|mono|stereo|demo|feat\.?|ft\.?|with\s)[^)]*\)/gi, '')
      .trim() || t.trim(); // fall back to original if cleaning empties it
  }
  const cleanTitle  = cleanTrackTitle(top.title);
  const cleanArtist = top.artist.replace(/\s*feat\.?.*/i,'').trim() || top.artist;

  // Try 4 combinations — most specific to least specific
  let found = null;
  const attempts = [
    [cleanTitle,  cleanArtist],
    [top.title,   cleanArtist],
    [cleanTitle,  top.artist],
    [top.title,   top.artist],
    [cleanTitle,  ''],          // title only, no artist filter
    [top.title,   ''],
  ];
  for (const [t, a] of attempts) {
    const q = '/search?track=' + encodeURIComponent(t) + (a ? '&artist=' + encodeURIComponent(a) : '');
    found = await spotifyCall(q);
    if (found?.uri) break;
  }

  if (!found?.uri) { showStaffToast('⏱ NOT FOUND ON SPOTIFY: ' + top.title); return; }
  const result = await spotifyCall('/queue', 'POST', { uri: found.uri });
  if (result?.ok) {
    await updateDoc(doc(db,'tracks',top.id), { spotifyQueued: true, spotifyUri: found.uri, queuedAt: Date.now() });
    showStaffToast('⏱ QUEUED: ' + found.name + ' — REMOVING IN 30s');
    // Auto-remove from board after 30 seconds (track is in Spotify queue)
    setTimeout(async () => {
      try {
        // Record as played before removing
        const { setDoc: sd } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        await sd(doc(db,'played',top.id), {
          title: top.title, artist: top.artist,
          playedAt: Date.now(), spotifyUri: found.uri,
        });
        await deleteDoc(doc(db,'tracks',top.id));
        showStaffToast('✅ REMOVED: ' + found.name + ' — QUEUING NEXT...');
        // Queue the next track
        setTimeout(() => runAutoQueue(), 2000);
      } catch(e) { console.warn('Auto-remove failed', e); }
    }, 30000);
  }
}

// ── BAN SYSTEM ──
window._banTrack = async function(id, title, artist) {
  try {
    const { setDoc: sd } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const key = (title + '|||' + artist).toLowerCase().replace(/[^a-z0-9|||]/g,'_');
    await sd(doc(db,'banned', key), { title, artist, bannedAt: Date.now() });
    // Also ditch the track from pending/approved
    await deleteDoc(doc(db,'tracks',id));
    showStaffToast('🚫 BANNED: ' + title);
    renderBanned();
  } catch(e) { showStaffToast('❌ BAN FAILED'); }
};

window._unbanTrack = async function(key) {
  try {
    await deleteDoc(doc(db,'banned', key));
    showStaffToast('✅ UNBANNED');
    renderBanned();
  } catch(e) {}
};

async function renderBanned() {
  const list = document.getElementById('banned-list');
  if (!list) return;
  try {
    const { getDocs, collection: col } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDocs(col(db,'banned'));
    const banned = snap.docs.map(d => ({ key:d.id, ...d.data() })).sort((a,b)=>b.bannedAt-a.bannedAt);
    document.getElementById('banned-count-num').textContent = banned.length;
    if (!banned.length) { list.innerHTML = '<div class="empty-state">NO BANNED TRACKS YET</div>'; return; }
    list.innerHTML = banned.map(b => `
      <div class="request-card" style="border-left-color:#ff4444">
        <div class="rc-info">
          <div class="rc-track">${b.title}</div>
          <div class="rc-artist">${b.artist}</div>
        </div>
        <div class="rc-actions">
          <button class="keep-btn" style="font-size:13px;padding:6px 12px" onclick="unbanTrack('${b.key}')">✓ UNBAN</button>
        </div>
      </div>`).join('');
  } catch(e) { list.innerHTML = '<div class="empty-state">ERROR</div>'; }
}

window._markPlayed = async function(id) {
  // Find the track before deleting it
  const track = allTracks.find(t => t.id === id);
  // Delete from active board
  await deleteDoc(doc(db,'tracks',id));
  // Record in played history with timestamp
  if (track) {
    try {
      const { setDoc, getDoc, doc: d2 } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await setDoc(doc(db,'played', id), {
        title:    track.title,
        artist:   track.artist,
        playedAt: Date.now(),
        spotifyUri: track.spotifyUri || '',
      });
      // ── Record to all-time leaderboard ──
      const key = (track.title + '|||' + track.artist).replace(/[^a-zA-Z0-9|_\- ]/g,'').substring(0,100);
      const ref = d2(db, 'alltime', key);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const ex = snap.data();
        await setDoc(ref, { ...ex, plays: (ex.plays || 0) + 1, thumb: track.thumb || ex.thumb });
      } else {
        await setDoc(ref, { title: track.title, artist: track.artist, thumb: track.thumb || '', plays: 1, addedAt: Date.now() });
      }
    } catch(e) { console.warn('Could not record played track', e); }
  }
  showStaffToast('✅ MARKED AS PLAYED — QUEUING NEXT...');
  setTimeout(() => {
    if (autoQueueOn) runAutoQueue();
    else queueTopTrack();
  }, 1500);
};

// Auto-expire played history after 1 hour (clean up old records)
async function cleanPlayedHistory() {
  try {
    const { getDocs: getD, collection: col, where, query: q2, deleteDoc: delD, doc: d2 } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const cutoff = Date.now() - 60 * 60 * 1000;
    const snap = await getD(col(db,'played'));
    snap.docs.forEach(async docSnap => {
      if (docSnap.data().playedAt < cutoff) await delD(docSnap.ref);
    });
  } catch(e) {}
}
setInterval(cleanPlayedHistory, 5 * 60 * 1000); // clean up every 5 mins

// Auto-remove tracks queued more than 15 mins ago (assume they played)
setInterval(async () => {
  if (!autoQueueOn) return;
  const now = Date.now();
  const stale = allTracks.filter(t => t.approved && t.spotifyQueued && t.queuedAt && (now - t.queuedAt) > 15 * 60 * 1000);
  for (const t of stale) {
    await deleteDoc(doc(db,'tracks',t.id));
  }
}, 60 * 1000); // check every minute

let staffToastTimer;
function showStaffToast(msg) {
  let el = document.getElementById('staff-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'staff-toast';
    el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(15,5,7,0.97);border:1px solid rgba(139,0,0,0.5);border-radius:8px;padding:14px 24px;font-family:var(--font-pixel);font-size:16px;letter-spacing:2px;color:#f0ede8;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.6);transition:opacity 0.3s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(staffToastTimer);
  staffToastTimer = setTimeout(() => { el.style.opacity = '0'; }, 4000);
}

function renderApproved() {
  const approved = [...allTracks.filter(t=>t.approved)].sort((a,b)=>b.uniqueVoters-a.uniqueVoters);
  document.getElementById('approved-count-num').textContent = approved.length;
  const list = document.getElementById('approved-list');
  if (!approved.length) { list.innerHTML = '<div class="empty-state">NO APPROVED TRACKS YET<br>APPROVE SOME REQUESTS...</div>'; return; }
  const workerReady = !!CONFIG.spotify_worker_url;
  list.innerHTML = approved.map((t,i) => {
    const spotifyUrl = 'https://open.spotify.com/search/' + encodeURIComponent(t.title + ' ' + t.artist);
    const spotifyApp = 'spotify:search:' + encodeURIComponent(t.title + ' ' + t.artist);
    const isQueued = !!t.spotifyQueued;
    return `
    <div class="approved-card ${i===0?'top-track':''} ${isQueued?'queued-track':''}">
      <div class="ac-rank">${i===0?'🔥':String(i+1).padStart(2,'0')}</div>
      <div class="ac-details">
        <div class="ac-title">${t.title}</div>
        <div class="ac-artist">${t.artist} · ${t.requester||'?'}</div>
        ${isQueued?'<div style="font-family:var(--font-pixel);font-size:11px;color:#1ED760;letter-spacing:2px;margin-top:2px">▶ QUEUED IN SPOTIFY</div>':''}
      </div>
      <div class="ac-meta">${t.uniqueVoters||1}<small>VOTES</small></div>
      ${workerReady && i===0 && !isQueued ? `<button class="queue-btn" onclick="queueTopTrack()">▶ QUEUE</button>` : ''}
      ${workerReady && isQueued ? `<button class="played-btn" onclick="markPlayed('${t.id}')">✓ PLAYED</button>` : ''}
      ${!workerReady ? `<a class="spotify-btn" href="${spotifyApp}" onclick="this.href='${spotifyApp}';setTimeout(()=>this.href='${spotifyUrl}',500)" target="_blank">▶</a>` : ''}
      <button class="ac-ditch" onclick="ditchTrack('${t.id}')">✕</button>
    </div>`;
  }).join('');
}
